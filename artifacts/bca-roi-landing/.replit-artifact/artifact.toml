kind = "web"
previewPath = "/"
title = "BCA - ROI Landing"
version = "1.0.0"
id = "artifacts/bca-roi-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19779

[services.development]
run = "pnpm --filter @workspace/bca-roi-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bca-roi-landing", "run", "build" ]
publicDir = "artifacts/bca-roi-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19779"
BASE_PATH = "/"
